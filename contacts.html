<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Introrealm Studios</title>
        <link rel="stylesheet" href="styles/styles.css">
    </head>

    <body>
            <main>
                <div class="top-bar">
                    <span>Contact page</span>
                    <div class="window-controls">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>      
                </div>
                <header>
                    <div class="header_wrapper">
                        <div class="brand">
                            <img src="introrealm_logo.png" alt="Introrealm studios with transparent globe"/>
                            <span>Introrealm Studios</span>
                        </div>
                        <nav>
                            <div class="buttons_wrapper">
                                <a href="index.html" class="home_button">Home</a>
                                <a href="contacts.html" class="contact_button">Contact</a>
                            </div>
                        </nav>
                    </div>
                </header> 
            <form class="contact-form">
                <div class="form-row">
                    <label for="customer_name">Your name:</label>
                    <input type="text" name="name" id="customer_name" size="20">
                </div>
                
                <div class="form-row">
                    <label for="customer_email">Your email:</label>
                    <input type="email" id="customer_email" name="email" size="20">
                </div>
                
                <div class="form-row">
                    <label for="message">Your idea:</label>
                    <textarea id="message" name="message" rows="4" cols="20"></textarea>
                </div>
                
                <div class="form-submit">
                    <input type="submit" value="Submit">
                </div>
            </form>

            <footer>
                <p>Created by McKenna Morrison-Ripley</p>
                <p>follow us on <a href="https://www.linkedin.com/in/mckennamorrisonripley/">LinkedIn</a> </p>
            </footer>
        </main>
    </body>
</html>
